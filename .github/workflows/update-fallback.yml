name: Atualizar Fallback JSON

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-fallback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar snapshots
        run: node scripts/update-fallback.mjs
        env:
          FALLBACK_SOURCE_API_URL: https://vendas.galpaodoaco.com/api

      - name: Gerar snapshots do dashboard
        run: node scripts/update-dashboard-fallback.mjs
        env:
          DASHBOARD_SOURCE_API_URL: https://vendas.galpaodoaco.com

      - name: Commitar alteracoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fallback-data
          if git diff --cached --quiet; then
            echo "Sem alteracoes no snapshot."
            exit 0
          fi
          git commit -m "chore: atualiza fallback json"
          git push
